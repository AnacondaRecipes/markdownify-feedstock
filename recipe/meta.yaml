{% set name = "markdownify" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/markdownify-{{ version }}.tar.gz
  sha256: 449c0bbbf1401c5112379619524f33b63490a8fa479456d41de9dc9e37560ebd

build:
  entry_points:
    - markdownify = markdownify.main:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  number: 0
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.2
    - setuptools-scm >=3.4.3
    - wheel
  run:
    - python
    - beautifulsoup4 >=4.9,<5
    - six >=1.15,<2

test:
  imports:
    - markdownify
  commands:
    - pip check
    - markdownify --help
  requires:
    - pip

about:
  home: https://github.com/matthewwithanm/python-markdownify
  summary: Convert HTML to markdown.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: |
    Markdownify is a Python library that converts HTML to Markdown.
    It can be used to convert web pages or other HTML documents to Markdown.
  dev_url: https://github.com/matthewwithanm/python-markdownify
  doc_url: https://github.com/matthewwithanm/python-markdownify
extra:
  recipe-maintainers:
    - gscoppino
